x-db-env: &db-env
  PGHOST: plane-db
  PGDATABASE: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_PORT: 5432
  PGDATA: /var/lib/postgresql/data

x-redis-env: &redis-env
  REDIS_HOST: plane-redis
  REDIS_PORT: 6379
  REDIS_URL: redis://plane-redis:6379/

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${MINIO_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}

x-aws-s3-env: &aws-s3-env
  AWS_REGION: 
  AWS_ACCESS_KEY_ID: ${MINIO_USER}
  AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: ${BUCKET_NAME}

x-proxy-env: &proxy-env
  APP_DOMAIN: ${APP_DOMAIN}
  FILE_SIZE_LIMIT: 5242880
  CERT_EMAIL: 
  CERT_ACME_CA: 
  CERT_ACME_DNS: 
  LISTEN_HTTP_PORT: 8010
  BUCKET_NAME: ${BUCKET_NAME}
  SITE_ADDRESS: ${SITE_ADDRESS:-:80}

x-mq-env: &mq-env
  RABBITMQ_HOST: plane-mq
  RABBITMQ_PORT: 5672
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST}

x-live-env: &live-env
  API_BASE_URL: http://api:8000
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}

x-app-env: &app-env
  WEB_URL: ${WEB_URL}
  DEBUG: 0
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  GUNICORN_WORKERS: 1
  USE_MINIO: 1
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@plane-db:5432/${POSTGRES_DB}
  SECRET_KEY: ${SECRET_KEY}
  AMQP_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@plane-mq:5672/${RABBITMQ_VHOST}
  API_KEY_RATE_LIMIT: 60/minute
  MINIO_ENDPOINT_SSL: 0
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}

services:
  web:
    image: makeplane/plane-frontend:v1.3.1
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    depends_on:
      - api
      - worker

  space:
    image: makeplane/plane-space:v1.3.0
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    depends_on:
      - api
      - worker
      - web

  admin:
    image: makeplane/plane-admin:v1.3.0
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    depends_on:
      - api
      - web

  live:
    image: makeplane/plane-live:v1.3.0
    environment:
      <<: [*live-env, *redis-env]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    depends_on:
      - api
      - web

  api:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-api.sh
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    volumes:
      - /opt/docker/plane/logs_api:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq

  worker:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-worker.sh
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    volumes:
      - /opt/docker/plane/logs_worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq

  beat-worker:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-beat.sh
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    volumes:
      - /opt/docker/plane/logs_beat-worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq

  migrator:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-migrator.sh
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - /opt/docker/plane/logs_migrator:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - plane-db
      - plane-redis

  plane-db:
    image: postgres:15.7-alpine
    command: postgres -c 'max_connections=1000'
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      <<: *db-env
    volumes:
      - /opt/docker/plane/pgdata:/var/lib/postgresql/data

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    volumes:
      - /opt/docker/plane/redisdata:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      <<: *mq-env
    volumes:
      - /opt/docker/plane/rabbitmq_data:/var/lib/rabbitmq

  plane-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /export --console-address ":9090"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      <<: *minio-env
    volumes:
      - /opt/docker/plane/uploads:/export

  proxy:
    image: makeplane/plane-proxy:v1.3.0
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      <<: *proxy-env
    ports:
      - "8010:80"
    volumes:
      - /opt/docker/plane/proxy_config:/config
      - /opt/docker/plane/proxy_data:/data
    depends_on:
      - web
      - api
      - space
      - admin
      - live
